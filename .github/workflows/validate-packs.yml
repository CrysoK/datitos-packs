name: Validate Packs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator
        run: npm install ajv-cli ajv-formats

      - name: Validate JSON packs
        run: |
          # Valida todos los archivos .json en subdirectorios (códigos de país),
          # excluyendo schema.json de la raíz.
          npx ajv validate -s schema.json -c ajv-formats -d "[a-z][a-z]/**/*.json"
